<svg width="500" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Оси -->
  <line x1="40" y1="200" x2="460" y2="200" stroke="black" stroke-width="2" marker-end="url(#arrowX)" />
  <line x2="250" y2="20" x1="250" y1="380" stroke="black" stroke-width="2" marker-end="url(#arrowY)" />
  
  <defs>
    <marker id="arrowX" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
    <marker id="arrowY" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="0">
      <path d="M 0 10 L 5 0 L 10 10 z" fill="black" />
    </marker>
  </defs>
  
  <text x="455" y="220" font-size="16">x</text>
  <text x="260" y="25" font-size="16">y</text>
  <text x="260" y="210" font-size="14">0</text>
  
  <!-- Деления: -2, 1, 3 (масштаб 1 ед = 50 пикс) -->
  <line x1="150" y1="195" x2="150" y2="205" stroke="black" stroke-width="1.5" />
  <text x="140" y="220" font-size="14">-2</text>
  
  <line x1="300" y1="195" x2="300" y2="205" stroke="black" stroke-width="1.5" />
  <text x="295" y="220" font-size="14">1</text>
  
  <line x1="400" y1="195" x2="400" y2="205" stroke="black" stroke-width="1.5" />
  <text x="395" y="220" font-size="14">3</text>
  
  <!-- График: f'(x) = (x+2)(x-1)(x-3)/15, масштаб Y: 1 ед = 80 пикс -->
  <!-- Вычисленные ключевые точки (x, y_pix): 
       x=-4 → -4.67 → 574, 
       x=-3 → -1.6 → 328, 
       x=-2 → 0 → 200, 
       x=-1 → 0.533 → 157, 
       x=0 → 0.4 → 168, 
       x=1 → 0 → 200, 
       x=2 → -0.267 → 221, 
       x=3 → 0 → 200, 
       x=4 → 1.2 → 104, 
       x=5 → 3.73 → -98 -->
  <path d="M 40,574
           C 60,450 80,380 100,328
           C 120,280 130,220 150,200
           C 165,185 180,160 200,157
           C 220,154 240,168 250,168
           C 270,168 285,185 300,200
           C 315,215 330,221 350,221
           C 370,221 385,215 400,200
           C 415,185 430,150 450,104
           C 460,60 470,0 480,-98"
        fill="none" stroke="red" stroke-width="3" />
  
  <!-- Корни (пересечения с осью X) -->
  <circle cx="150" cy="200" r="5" fill="red" />
  <circle cx="300" cy="200" r="5" fill="red" />
  <circle cx="400" cy="200" r="5" fill="red" />
  
  <!-- Знаки производной
  <text x="80" y="240" font-size="14" fill="green">–</text>
  <text x="220" y="170" font-size="14" fill="green">+</text>
  <text x="340" y="240" font-size="14" fill="green">–</text>
  <text x="440" y="170" font-size="14" fill="green">+</text>
   -->
  <!-- Подписи -->
  <text x="40" y="395" font-size="13" fill="gray">По графику производной найдите точку максимума</text>
</svg>